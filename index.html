<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luigi Vacchelli Portfolio</title>
  <link href="stile.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
</head>
<body>

<!-- Header -->
<div class="page-header">
  <div class="header-left">luigivacchelli</div>
  <div class="header-right">
    <div class="about-toggle" id="about-trigger">chisono</div>
  </div>
</div>

<!-- Galleria -->
<div class="container">
  <div class="column">
    <a class="media-link image-link"><img src="immagini/frame.jpg" alt=""></a>
    <a class="media-link"><video autoplay loop muted playsinline src="graphics/ghosts.mp4"></video></a>
    <a class="media-link image-link"><img src="immagini/edera.jpg" alt=""></a>
    <a class="media-link image-link"><img src="immagini/ambulance.jpg" alt=""></a>
    <a class="media-link image-link"><img src="immagini/sea.jpg" alt=""></a>
    <a class="media-link"><video autoplay loop muted playsinline src="video/sun.mp4"></video></a>
    <a class="media-link image-link"><img src="immagini/wip.jpg" alt=""></a>
    <a class="media-link image-link"><img src="immagini/tube.jpg" alt=""></a>
  </div>
  <div class="column">
    <a class="media-link image-link"><img src="immagini/track.jpg" alt=""></a>
    <a class="media-link image-link"><img src="immagini/bike.jpg" alt=""></a>
    <a class="media-link"><video autoplay loop muted playsinline src="video/flares.mp4"></video></a>
    <a class="media-link image-link"><img src="immagini/web.jpg" alt=""></a>
    <a class="media-link image-link"><img src="immagini/pool.jpg" alt=""></a>
    <a class="media-link image-link"><img src="immagini/peter/peter1.jpg" data-gallery="immagini/peter/peter2.jpg,immagini/peter/peter3.jpg,immagini/peter/peter4.jpg,immagini/peter/peter5.jpg" alt=""></a>
    <a class="media-link image-link"><img src="immagini/balls.jpg" alt=""></a>
    <a class="media-link image-link"><img src="immagini/greenhand.jpg" alt=""></a>
    <a class="media-link image-link"><img src="immagini/web.jpg" alt=""></a>
  </div>
</div>

<!-- Overlay immagine e testo -->
<div class="fullscreen-overlay" id="fullscreen-overlay">
  <div class="overlay-content">
    <img src="immagini/luigivacchelli.jpg" alt="Luigi Vacchelli">
    <div class="overlay-text">
      director and photographer<br>
      body is in Rome, heart is in Genoa, mind is at peace
    </div>
  </div>
</div>

<!-- JavaScript -->
<script>
  const trigger = document.getElementById('about-trigger');
  const overlay = document.getElementById('fullscreen-overlay');

  trigger.addEventListener('click', () => {
    overlay.classList.add('show');
  });

  overlay.addEventListener('click', () => {
    overlay.classList.remove('show');
  });

  // Cambio immagini Peter
  document.querySelectorAll('.image-link img').forEach(img => {
    const originalSrc = img.src;
    const gallery = img.dataset.gallery ? img.dataset.gallery.split(',') : [];
    let index = 0;

    img.addEventListener('click', () => {
      if (gallery.length === 0) return;
      index = (index + 1) % (gallery.length + 1);
      img.src = index === 0 ? originalSrc : gallery[index - 1];
    });
  });
</script>

</body>
</html>
